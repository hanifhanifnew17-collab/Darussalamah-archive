<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ HACKED BY fanz_... ]</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Yuji+Syuku&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; height: 100vh; font-family: 'Orbitron', sans-serif; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://i.postimg.cc/1XKRCQPj/09d9d374007975-5c1d081cac807.jpg') no-repeat center center; background-size: 155%; filter: brightness(0.4) contrast(1.2); z-index: -2; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.8; }
        .container { display: flex; flex-direction: column; justify-content: flex-start; align-items: center; height: 100vh; text-align: center; padding-top: 25px; overflow-y: auto; }
        .hacker-img { width: 140px; height: 170px; border: 3px solid #ff0000; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 0 25px #ff0000; object-fit: cover; }
        .hacked-text { font-size: 1.6rem; font-weight: 900; margin-bottom: 5px; text-shadow: 0 0 20px #ff0000; color: #ff0000; }
        .message { font-size: 0.85rem; color: #fff; text-shadow: 0 0 8px #ff0000; max-width: 450px; line-height: 1.4; margin-bottom: 10px; padding: 0 20px; }
        .thanks { font-size: 0.75rem; color: #ffffff; text-shadow: 0 0 10px #ff0000; margin-bottom: 15px; }
        .logo-hybrid { width: 280px; opacity: 0.8; filter: drop-shadow(0 0 5px red); margin-bottom: 15px; }
        .spotify-container { width: 300px; margin-top: 10px; border-radius: 12px; border: 1px solid #ff0000; box-shadow: 0 0 15px #ff0000; overflow: hidden; background: rgba(0,0,0,0.8); }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <canvas id="matrix"></canvas>
    <div class="container">
        <img src="https://i.postimg.cc/tTrVYy0q/ezgif-4d22387526e86195.gif" class="hacker-img">
        <div class="hacked-text">[ HACKED BY fanz_... ]</div>
        <div class="message">"Keamanan hanyalah ilusi, Kami ada di mana-mana, namun tak terlihat. Kami tidak merusak, kami hanya memberi tahu bahwa Anda lemah."</div>
        <div class="thanks">thanks to : REZXPLOIT RXP TEAM SCA NEWGEN</div>
        <img src="https://i.postimg.cc/mgxdJhSR/20260515-200027.png" class="logo-hybrid">
        
        <div class="spotify-container">
            <iframe src="https://open.spotify.com/embed/track/2ZYe69fKzI46Z2D69O6o6p?utm_source=generator&theme=0" width="100%" height="80" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        const chars = 'ｦｱｳｴｵｶｷｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ';
        const fontSize = 18;
        const drops = Array(Math.floor(canvas.width / fontSize)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff0000';
            ctx.font = 'bold ' + fontSize + 'px "Yuji Syuku", serif';
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);
    </script>
</body>
</html>
