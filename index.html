<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ HACKED BY fanz_... ]</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; color: #ff0000; font-family: 'Orbitron', sans-serif; overflow: hidden; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://i.postimg.cc/1XKRcqPj/09d9d374007975-5c1d081cac807.jpg') no-repeat center center; background-size: cover; opacity: 0.3; z-index: -2; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.8; }
        .container { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; text-align: center; padding: 20px; }
        .hacker-img { width: 150px; border: 3px solid #ff0000; border-radius: 10px; margin-bottom: 20px; box-shadow: 0 0 20px #ff0000; }
        .hacked-text { font-size: 2rem; font-weight: 900; margin-bottom: 15px; text-shadow: 0 0 10px #ff0000; }
        .message { font-size: 0.9rem; max-width: 500px; margin-bottom: 20px; line-height: 1.5; color: #fff; }
        .thanks { font-size: 0.8rem; margin-bottom: 25px; color: #aaa; }
        .logo-wrap { width: 100%; max-width: 320px; margin-top: 10px; }
        .logo-img { width: 100%; filter: drop-shadow(0 0 8px red); opacity: 0.9; }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <canvas id="matrix"></canvas>
    <div class="container">
        <img src="https://i.postimg.cc/tTrVYy0q/ezgif-4d22387526e86195.gif" class="hacker-img">
        <div class="hacked-text">[ HACKED BY fanz_... ]</div>
        <div class="message">"Keamanan hanyalah ilusi, Kami ada di mana-mana, namun tak terlihat. Kami tidak merusak, kami hanya memberi tahu bahwa Anda lemah."</div>
        <div class="thanks">thanks to : REZXPLOIT RXP TEAM SCA NEWGEN</div>
        <div class="logo-wrap">
            <img src="https://i.postimg.cc/mgxdJhSR/20260515-200027.png" class="logo-img">
        </div>
    </div>
    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        const chars = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワン';
        const fontSize = 18;
        const drops = Array(Math.floor(canvas.width / fontSize)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff0000';
            ctx.font = 'bold ' + fontSize + 'px monospace';
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 50);
    </script>
</body>
</html>
