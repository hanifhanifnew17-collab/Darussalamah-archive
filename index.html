<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[ HACKED BY fanz_... ]</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Yuji+Syuku@import url('https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap');display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #000; overflow: hidden; height: 100vh; font-family: 'Orbitron', sans-serif; }
        .bg-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('https://i.postimg.cc/1XKRCQPj/09d9d374007975-5c1d081cac807.jpg') no-repeat center center; background-size: 155%; filter: brightness(0.4) contrast(1.2); z-index: -2; }
        canvas { position: fixed; top: 0; left: 0; z-index: -1; opacity: 0.8; }
        .container { display: flex; flex-direction: column; justify-content: flex-start; align-items: center; height: 100vh; text-align: center; padding-top: 30px; }
        .hacker-img { width: 150px; height: 180px; border: 3px solid #ff0000; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 0 30px #ff0000; object-fit: cover; }
        .hacked-text { font-size: 1.75rem; font-weight: 900; margin-bottom: 8px; text-shadow: 0 0 25px #ff0000; color: #ff0000; }
        .message { font-size: 0.95rem; color: #fff; text-shadow: 0 0 8px #ff0000; max-width: 450px; line-height: 1.4; margin-bottom: 15px; padding: 0 20px; }
        .thanks { font-size: 0.85rem; color: #ffffff; text-shadow: 0 0 10px #ff0000; }
    </style>
</head>
<body>
    <div class="bg-overlay"></div>
    <canvas id="matrix"></canvas>
    <div class="container">
        <img src="https://i.postimg.cc/tTrVYy0q/ezgif-4d22387526e86195.gif" class="hacker-img">
        <div class="hacked-text">[ HACKED BY fanz_... ]</div>
        <div class="message">"Keamanan hanyalah ilusi, Kami ada di mana-mana, namun tak terlihat. Kami tidak merusak, kami hanya memberi tahu bahwa Anda lemah."</div>
        <div class="thanks">thanks to : REZXPLOIT RXP TEAM SCA NEWGEN</div>
        <div style="display: flex; justify-content: center; width: 100%; margin-top: 20px; padding-bottom: 30px;">
            <img src="https://i.postimg.cc/mgxdJhSR/20260515-200027.png" style="width: 300px; opacity: 0.8; filter: drop-shadow(0 0 5px red);">
        </div>
    </div>
    <script>
        const canvas = document.getElementById('matrix');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.onresize = resize; resize();
        const chars = 'ｦｱｳｴｵｶｷｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝX01Z89'; 
        const fontSize = 18;
        const drops = Array(Math.floor(canvas.width / fontSize)).fill(1);
        function draw() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ff0000';
            ctx.font = 'bold ' + fontSize + 'px "Yuji Syuku", serif';
            drops.forEach((y, i) => {
                const text = chars[Math.floor(Math.random() * chars.length)];
                ctx.fillText(text, i * fontSize, y * fontSize);
                if (y * fontSize > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(draw, 35);
    </script>
</body>
</html>
